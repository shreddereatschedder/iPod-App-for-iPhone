name: iPodApp
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  YouTubeKit:
    url: https://github.com/b5i/YouTubeKit
    from: "1.0.0"

targets:
  iPodApp:
    type: application
    platform: iOS
    sources:
      - iPodApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.iPodApp
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: iPodApp/Info.plist
    dependencies:
      - package: YouTubeKit